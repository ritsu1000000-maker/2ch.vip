<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>2ch風 掲示板（レトロデザイン再現）</title>
    <style>
        /* --- 基本的な設定（レトロフォント・背景） --- */
        body { 
            font-family: "MS PGothic", "IPAMonaPGothic", sans-serif; 
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gAFWPAAn///gVb/P//f8YAAAAASUVORK5CYII='); /* レンガ調の背景パターン（簡易版） */
            background-repeat: repeat;
            background-color: #f1ebd8;
            margin: 0;
            padding: 0;
            display: flex;
        }

        /* --- 左側のサイドバー（メニュー） --- */
        #menu-bar {
            width: 140px;
            background: #fff;
            border-right: 2px solid #aaa;
            padding: 10px;
            font-size: 12px;
            color: #333;
            min-height: 100vh;
            line-height: 1.4;
        }
        #menu-bar h3 { font-size: 13px; margin: 10px 0 5px; color: #cc0000; border-bottom: 1px dashed #ccc; }
        #menu-bar a { text-decoration: none; color: blue; display: block; }
        #menu-bar a:hover { color: red; }

        /* --- メインコンテンツ（スレッドエリア） --- */
        #main-view {
            flex: 1;
            padding: 20px;
            font-size: 16px;
        }

        /* --- スレッドの枠 --- */
        .thread-box {
            background-color: #efefef;
            border: 2px solid #aaa;
            padding: 10px;
            margin-bottom: 20px;
        }

        /* --- スレッドタイトル（赤色） --- */
        .thread-title {
            color: #cc0000;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #cc0000;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        /* --- レス一行目（名前・日付・ID） --- */
        .post-header {
            font-size: 14px;
            color: #333;
            margin-bottom: 3px;
        }
        .post-header b { color: green; } /* 名前は緑色 */
        .post-header .id-text { color: red; } /* IDは赤色 */

        /* --- レス本文 --- */
        .post-body {
            margin-left: 15px;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        /* --- 投稿フォーム --- */
        .form-area {
            background-color: #fff;
            border: 1px solid #aaa;
            padding: 10px;
            margin-top: 20px;
            font-size: 14px;
        }
        .form-area textarea {
            width: 500px;
            height: 100px;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div id="menu-bar">
    <h3>掲示板メニュー</h3>
    <a href="index.html">■トップに戻る</a>
    <h3>カテゴリー</h3>
    <a href="#">ニュース</a>
    <a href="#">実況</a>
    <a href="#">雑談</a>
    <h3>ツール</h3>
    <a href="admin.html">管理者画面</a>
</div>

<div id="main-view">

    <div class="thread-box">
        <div class="thread-title">【1:3】 スレ立てできる？</div>

        <div class="post">
            <div class="post-header">
                1 名前：<b>名無しって何ですか？</b>：2026/04/02(木) 13:22:32.98 <span class="id-text">ID:zohgFVDC.net</span>
            </div>
            <div class="post-body">どうだろ？</div>
        </div>

        <div class="post">
            <div class="post-header">
                2 名前：<b>名無しって何ですか？</b>：2026/04/02(木) 13:46:20.82 <span class="id-text">ID:zohgFVDC.net</span>
            </div>
            <div class="post-body">てすと</div>
        </div>

        <div class="form-area">
            <input type="button" value="書き込む">
            名前： <input type="text" style="width: 150px;">
            E-mail： <input type="text" style="width: 150px;">
            <textarea placeholder="ここに書き込みます"></textarea>
        </div>
    </div>

    <div class="thread-box">
        <div class="thread-title">【2:4】 4月から高2陽キャ男子だけどなんか質問ある</div>
        
        <div class="post">
            <div class="post-header">
                1 名前：<b>名無しさん</b>：2026/04/03(金) 10:00:00.00 <span class="id-text">ID:abc12345.net</span>
            </div>
            <div class="post-body">質問に答えるぜ</div>
        </div>
    </div>

</div>

</body>
</html>
