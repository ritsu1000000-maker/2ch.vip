<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #f1ebd8; background-image: url('https://www.2ch.sc/2ch_common/p_brick.gif'); font-family: "MS PGothic", sans-serif; margin: 10px; }
        .thread-box { background: #efefef; border: 1px solid #aaa; padding: 10px; margin-bottom: 30px; }
        .title { color: #cc0000; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        .post { margin-bottom: 15px; font-size: 15px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .post b { color: green; }
        .post-id { color: #333; }
        .form-area { border: 1px solid #aaa; background: #fff; padding: 15px; margin-top: 10px; box-shadow: 2px 2px 0 #888; }
        .btn-post { padding: 5px 15px; cursor: pointer; background: #eee; border: 1px solid #888; }
        table.admin-table { width: 100%; border-collapse: collapse; background: white; color: black; }
        table.admin-table th, table.admin-table td { border: 1px solid #aaa; padding: 8px; font-size: 12px; }
    </style>
</head>
<body>

<div id="app"></div>

<script>
    const STORAGE_KEY = '2ch_hybrid_db';
    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { threads: {} };

    // 1日限定の4桁ID生成
    function generateID(seed) {
        const date = new Date().toISOString().split('T')[0];
        let hash = 0;
        const str = seed + date;
        for (let i = 0; i < str.length; i++) {
            hash = ((hash << 5) - hash) + str.charCodeAt(i);
            hash |= 0;
        }
        return Math.abs(hash).toString(36).substring(0, 4).toUpperCase();
    }

    function render() {
        const params = new URLSearchParams(window.location.search);
        const tId = params.get('t');
        const mode = params.get('mode');
        const app = document.getElementById('app');

        // --- 管理者モード ---
        if (mode === 'admin') {
            let html = `<h2>掲示板 管理パネル</h2><table class="admin-table"><tr><th>ID</th><th>タイトル</th><th>レス</th><th>操作</th></tr>`;
            Object.keys(db.threads).sort().forEach(id => {
                html += `<tr><td>${id}</td><td>${db.threads[id].title}</td><td>${db.threads[id].posts.length}</td>
                        <td><button onclick="deleteThread('${id}')">削除</button></td></tr>`;
            });
            html += `</table><br><a href="iyan.html">戻る</a>`;
            app.innerHTML = html;
            return;
        }

        // --- スレッド内表示 ---
        if (tId && db.threads[tId]) {
            const t = db.threads[tId];
            let html = `<div class="thread-box"><div class="title">【${tId}】 ${t.title}</div>`;
            t.posts.forEach((p, i) => {
                html += `<div class="post">${i+1} 名前：<b>名無しさん</b>：${p.time} <span class="post-id">ID:${p.uid}</span><br><br>${p.content.replace(/\n/g, '<br>')}</div>`;
            });
            html += `
                <div class="form-area">
                    <button class="btn-post" onclick="addPost('${tId}')">書き込む</button>
                    名前：<input id="name" type="text" size="15"> E-mail：<input id="mail" type="text" size="15" value="sage">
                    <textarea id="msg" style="width:98%; height:100px; margin-top:10px;"></textarea>
                </div>
                <br><a href="iyan.html">■掲示板トップへ戻る</a></div>`;
            app.innerHTML = html;
        } else {
            // --- トップ画面 (スレッド一覧) ---
            let html = `<h2>スレッド一覧</h2>`;
            Object.keys(db.threads).sort((a,b) => b-a).forEach(id => {
                html += `<a href="?t=${id}" style="color:blue; font-weight:bold; display:block; margin-bottom:8px;">■${db.threads[id].title} (${db.threads[id].posts.length})</a>`;
            });
            html += `
                <div class="form-area" style="margin-top:40px;">
                    <h3>新規スレ作成</h3>
                    タイトル：<input id="t-title" type="text" style="width:70%;"><br><br>
                    <button class="btn-post" onclick="createThread()">スレッド作成</button>
                </div>`;
            app.innerHTML = html;
        }
    }

    window.createThread = () => {
        const title = document.getElementById('t-title').value;
        if(!title) return;
        const id = Math.floor(Date.now() / 1000); 
        db.threads[id] = { title: title, posts: [] };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
        window.location.search = `?t=${id}`;
    };

    window.addPost = (tId) => {
        const content = document.getElementById('msg').value;
        if(!content) return;
        db.threads[tId].posts.push({
            content,
            uid: generateID(Math.random().toString()),
            time: new Date().toLocaleString()
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
        render();
    };

    window.deleteThread = (id) => {
        if(confirm("削除しますか？")) {
            delete db.threads[id];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            render();
        }
    };

    render();
</script>
</body>
</html>
</body>
</html>
